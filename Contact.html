<!DOCTYPE html>
<html>

<head>
    <title>FortuneGlobal E-Hub - Contact</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: brown;
        }

        /* NAVBAR */
        nav {
            background-color: black;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: orange;
        }

        /* BANNER WITH IMAGE */
        .contact-banner {
            background: url('https://images.unsplash.com/photo-1521790360281-3b2b6f3b8a1b') no-repeat center center/cover;
            padding: 100px 20px;
            text-align: center;
            color: white;
        }

        .contact-banner h2 {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .contact-banner p {
            font-size: 20px;
        }

        /* CONTACT FORM */
        .contact-form {
            background-color: white;
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 10px;
        }

        .contact-form h3 {
            text-align: center;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .contact-form button {
            width: 100%;
            padding: 12px;
            background-color: orange;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .contact-form button:hover {
            background-color: darkorange;
        }

        /* FOOTER */
        footer {
            margin-top: 20px;
        }

        footer p {
            color: white;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <nav>
        <a href="index.html">Home</a>
        <a href="electronic.html">Electronic</a>
        <a href="cars.html">Cars</a>
        <a href="fashion.html">Fashion</a>
        <a href="games.html">Games</a>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- BANNER -->
    <div class="contact-banner">
        <h2>Contact Us</h2>
        <p>We’re here to help you 24/7</p>
    </div>

    <!-- FORM -->
    <div class="contact-form">
        <h3>Send us a message</h3>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <!-- FOOTER -->
   <!-- Footer -->
<center>
    <footer>
        <p>© March 2026 FortuneGlobal E-Hub Website. All rights reserved.</p>
    </footer>
</center>

</body>
</html>
